<svg width="100%" viewBox="0 0 690 320" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">QurbaniHut logo — green edition</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">QurbaniHut logo with a green color scheme, featuring a stylized hut with crescent moon and star</desc>

  <defs>
    
  <mask id="imagine-text-gaps-vecugy" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="690" height="320" fill="white"/><rect x="393.1400146484375" y="146" width="291.2339782714844" height="69.5999984741211" fill="black" rx="2"/><rect x="417" y="206" width="238.6999969482422" height="24" fill="black" rx="2"/></mask></defs>

  <!-- HUT BODY -->
  <rect x="228" y="168" width="144" height="88" rx="4" fill="#3B6D11" style="fill:rgb(59, 109, 17);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Door -->
  <rect x="282" y="196" width="36" height="60" rx="18" fill="#173404" style="fill:rgb(23, 52, 4);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
